name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this pull request's changes to the Playwright test suite and
            supporting config. Reference REQUIREMENTS.md for the business rules
            the tests must satisfy (email format, password complexity, validation
            messages, SUBMIT/ENTER login, welcome screen).

            Give insights on:
            - Whether new/changed tests actually verify the business requirement
              they claim to cover, and whether any requirement is left untested.
            - Correctness issues: flaky selectors, race conditions, assertions
              that don't match what the UI actually does.
            - Maintainability: duplication across test cases, unclear naming,
              opportunities to share setup/helpers.
            Keep feedback specific to the diff, with file/line references.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
